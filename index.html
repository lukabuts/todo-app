<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- General Meta Tags -->
    <meta name="description" content="To-do app helps you plan your day" />
    <meta name="keywords" content="discipline, motivation, productivity" />
    <meta name="author" content="Luka Butskhrikidze" />
    <meta name="application-name" content="To-do app" />

    <!-- For Facebook -->
    <meta property="og:title" content="To-do App" />
    <meta property="og:type" content="article" />
    <meta property="og:image" content="imgs/background.svg" />
    <meta property="og:url" content="https://todo-app-weld-nine.vercel.app/" />
    <meta
      property="og:description"
      content="To-do app helps you plan your day efficiently. Stay organized and boost productivity with this simple and intuitive to-do app."
    />

    <!-- For Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="To-do App" />
    <meta
      name="twitter:description"
      content="To-do app helps you plan your day efficiently. Stay organized and boost productivity with this simple and intuitive to-do app."
    />
    <meta name="twitter:image" content="imgs/background.svg" />

    <title>To-do app</title>
    <link rel="stylesheet" href="output.css" />
    <link rel="icon" href="imgs/to-do-list-apps.png" />
  </head>
  <body class="flex justify-center p-[20px] bg-slate-600">
    <div class="w-[100%] max-w-container rounded-[10px] overflow-hidden">
      <!-- ! flower -->
      <!-- ? bg-flowers -->
      <div
        class="bg-flowers w-[100%] h-title bg-center flex items-end justify-end max-sm:h-[150px]"
      >
        <div
          id="time"
          class="flex items-end flex-col m-container-padding text-white select-none max-sm:m-[10px]"
        ></div>
      </div>
      <!-- ! main -->
      <div class="bg-white p-container-padding max-sm:p-[10px]">
        <!-- ! Form -->
        <form class="flex gap-[10px] mb-input-todos">
          <div
            class="flex-1 flex items-center gap-2 h-[49px] p-[12px] bg-input rounded-[5px] relative max-sm:p-[5px]"
          >
            <div
              class="bg-greenish w-icon h-icon flex items-center justify-center rounded-full select-none shrink-0 max-sm:hidden"
            >
              <img src="imgs/done.svg" />
            </div>
            <!-- ! Special Input -->
            <input
              type="text"
              id="input"
              placeholder="Note"
              class="text-gray bg-transparent w-[100%] focus-visible:outline-none"
            />
          </div>
          <input
            type="submit"
            id="submit-btn"
            value="+"
            class="w-btn bg-greenish rounded-[5px] cursor-pointer text-white text-[30px] shrink-0 max-sm:w-[49px]"
          />
        </form>
        <!-- ! todo -->
        <div id="todos" class="flex flex-col gap-main"></div>
      </div>
    </div>
    <script src="src/main.js"></script>
    <script src="src/time.js"></script>
  </body>
</html>
